<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R&D Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <!-- Premium R&D Preloader (Automatically replaced once React mounts) -->
      <div style="
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle at center, #ffffff 0%, #fafcfe 100%);
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      ">
        <!-- Outer Glowing Ring -->
        <div style="
          position: relative;
          width: 80px;
          height: 80px;
          display: flex;
          justify-content: center;
          align-items: center;
        ">
          <!-- Animated Spinner Ring 1 -->
          <div style="
            position: absolute;
            width: 64px;
            height: 64px;
            border: 4px solid transparent;
            border-top-color: #0b2d4d;
            border-bottom-color: #00a6c8;
            border-radius: 50%;
            animation: rd-spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
          "></div>
          <!-- Animated Spinner Ring 2 (Counter-rotational) -->
          <div style="
            position: absolute;
            width: 48px;
            height: 48px;
            border: 4px solid transparent;
            border-left-color: #00a6c8;
            border-right-color: rgba(11, 45, 77, 0.2);
            border-radius: 50%;
            animation: rd-spin-reverse 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
          "></div>
        </div>

        <!-- Sleek Workspace Text -->
        <div style="
          margin-top: 24px;
          text-align: center;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 6px;
        ">
          <span style="
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #0b2d4d;
            text-transform: uppercase;
            animation: rd-pulse 1.8s ease-in-out infinite;
          ">R&amp;D Workspace</span>
          <span style="
            font-size: 0.78rem;
            font-weight: 500;
            color: #7b8794;
            letter-spacing: 0.5px;
          ">Initializing modules...</span>
        </div>

        <!-- Embedded Keyframe Animations -->
        <style>
          @keyframes rd-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
          @keyframes rd-spin-reverse {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
          }
          @keyframes rd-pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
